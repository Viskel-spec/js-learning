<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Счётчик</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    #count {
      font-size: 80px;
      margin-bottom: 20px;
    }
    button {
      font-size: 30px;
      margin: 0 10px;
      padding: 10px 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="count">0</div>
  <div>
    <button id="btn-minus">−</button>
    <button id="btn-plus">+</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
